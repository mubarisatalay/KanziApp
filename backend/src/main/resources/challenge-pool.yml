# Challenge pool — loaded into pool_challenges on startup by ChallengePoolLoader.
# Rule: every challenge must be something everyone does the SAME WAY so entries
# can be meaningfully compared and voted on. Bad: "show what made you happy today"
# (everyone shows something different). Good: "strike your best superhero pose"
# (everyone does the same thing, vote on who nailed it).
#
# To add new challenges: append entries here and redeploy. Existing rows are
# never deleted — the loader inserts only entries missing from the DB.

