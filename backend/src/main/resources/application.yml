spring:
  application:
    name: kanzi-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/kanzi}
    username: ${DB_USERNAME:kanzi}
    password: ${DB_PASSWORD:kanzi}

  jpa:
    hibernate:
      # Liquibase owns the schema; Hibernate only validates entities against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    properties:
      mail.smtp.auth: "false"
      mail.smtp.starttls.enable: "false"

  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 6MB

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# --- Application-specific config (wired up in later phases) ---
app:
  base-url: ${APP_BASE_URL:http://localhost:8080}
  mail:
    from: ${MAIL_FROM:no-reply@kanzi.app}
  # JWT signing (RSA). Dev auto-generates an ephemeral keypair (see JwtConfig);
  # prod should inject a fixed keypair so tokens survive restarts.
  jwt:
    access-token-ttl: ${JWT_ACCESS_TTL:PT15M}
    refresh-token-ttl: ${JWT_REFRESH_TTL:P30D}
  # S3 / MinIO object storage.
  # `endpoint` is what the backend uses to talk to storage (minio:9000 inside Docker);
  # `public-url` is what clients use to fetch images (localhost:9000 from the host).
  storage:
    endpoint: ${S3_ENDPOINT:http://localhost:9000}
    public-url: ${S3_PUBLIC_URL:http://localhost:9000}
    region: ${S3_REGION:us-east-1}
    bucket: ${S3_BUCKET:challenge-images}
    access-key: ${S3_ACCESS_KEY:minioadmin}
    secret-key: ${S3_SECRET_KEY:minioadmin}
  daily-challenge:
    cron: ${DAILY_CHALLENGE_CRON:0 0 0 * * *}
  # When each day's results open (votes/submissions close): local wall-clock time in `zone`.
  reveal:
    time: ${REVEAL_TIME:21:00}
    zone: ${REVEAL_ZONE:Europe/Istanbul}
