# KanziApp backend stack (base). From backend/:
#   docker compose up
# On Apple Silicon, use the arm64 overlay instead:
#   docker compose -f docker-compose.arm64.yml up
# Build the backend image first with Jib:  mvn compile jib:dockerBuild
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: kanzi
      POSTGRES_USER: kanzi
      POSTGRES_PASSWORD: kanzi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kanzi -d kanzi"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Flutter web (CanvasKit) fetches images via JS fetch(), which needs CORS headers.
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Creates the challenge-images bucket on startup and makes it public-read.
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/challenge-images &&
      mc anonymous set download local/challenge-images
      "

  mailpit:
    image: axllent/mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # web UI
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/livez"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: kanzi-api:latest   # built by `mvn compile jib:dockerBuild`
    # Gated behind the "app" profile so `docker compose up -d` (infra only) never tries to
    # pull this un-built image. Start it with: docker compose --profile app up -d
    profiles: ["app"]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/kanzi
      DB_USERNAME: kanzi
      DB_PASSWORD: kanzi
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_URL: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: challenge-images
      SPRING_MAIL_HOST: mailpit
      SPRING_MAIL_PORT: "1025"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  pgdata:
  miniodata:
